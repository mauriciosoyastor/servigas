<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Cierre</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1920px; height: 1080px; overflow: hidden;
      font-family: Montserrat, sans-serif;
      background: #1A1A1A; color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
      background-image:
        radial-gradient(ellipse at 50% 30%, rgba(245,124,0,0.18), transparent 55%),
        linear-gradient(180deg, #141414, #1A1A1A 60%, #201810);
    }
    .mark {
      width: 84px; height: 84px; border-radius: 50% 50% 50% 10%;
      transform: rotate(-35deg);
      background: linear-gradient(135deg, #FFD600, #F57C00, #E64A19, #BF360C);
      box-shadow: 0 0 48px rgba(245,124,0,0.4);
      margin-bottom: 12px;
    }
    .product {
      font-size: 22px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.7);
    }
    h1 {
      font-size: 56px; font-weight: 700; text-align: center;
      max-width: 1100px; line-height: 1.15;
    }
    .cta {
      margin-top: 18px;
      padding: 18px 36px; border-radius: 14px;
      background: linear-gradient(135deg, #FFD600, #F57C00, #E64A19);
      color: #1A1A1A; font-size: 20px; font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="mark" aria-hidden="true"></div>
  <p class="product">Plataforma de gestión</p>
  <h1>Todo tu negocio, en un solo lugar.</h1>
  <div class="cta">Pedí una demo</div>
</body>
</html>
